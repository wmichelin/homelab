services:
  node-exporter:
    image: prom/node-exporter:v1.10.2
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - ./textfile:/textfile:ro
      - /run/systemd:/run/systemd:ro
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run|var/lib/docker|var/lib/containerd)($$|/)'
      - '--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$'
      - '--collector.systemd'
      - '--collector.textfile.directory=/textfile'

  smartctl-exporter:
    image: prometheuscommunity/smartctl-exporter:v0.14.0
    container_name: smartctl-exporter
    restart: unless-stopped
    privileged: true
    user: root
    security_opt:
      - apparmor:unconfined
    ports:
      - "9633:9633"
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro

  # Writes docker_* textfile metrics. Uses the docker socket so it works even
  # when systemd --user timers lack the docker supplementary group.
  docker-stats-exporter:
    image: python:3.12-alpine
    container_name: docker-stats-exporter
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./textfile:/textfile
      - ./scripts/docker_stats_exporter.py:/app/docker_stats_exporter.py:ro
    environment:
      - TEXTFILE_DIR=/textfile
      - SCRAPE_INTERVAL=30
    command: ["python", "/app/docker_stats_exporter.py"]

  # Host NIC byte counters via sysfs. node-exporter's netdev collector uses
  # netlink (container netns), so it only sees eth0 unless we use host
  # networking — which breaks LAN scrapes behind ProtonVPN.
  host-netdev-exporter:
    image: python:3.12-alpine
    container_name: host-netdev-exporter
    restart: unless-stopped
    volumes:
      - /sys:/host/sys:ro
      - ./textfile:/textfile
      - ./scripts/host_netdev_exporter.py:/app/host_netdev_exporter.py:ro
    environment:
      - TEXTFILE_DIR=/textfile
      - SYSFS=/host/sys
      - DEVICES=enp3s0,proton0
      - SCRAPE_INTERVAL=15
    command: ["python", "/app/host_netdev_exporter.py"]
